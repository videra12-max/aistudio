<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Video Studio</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#111;
color:white;
}

header{
padding:20px;
font-size:26px;
font-weight:bold;
}

.section{
padding:20px;
}

.row{
display:flex;
overflow-x:auto;
gap:12px;
}

.card{
background:#1c1c1c;
border-radius:12px;
padding:16px;
min-width:160px;
cursor:pointer;
transition:.2s;
}

.card:hover{
background:#2c2c2c;
}

button{
background:#e50914;
border:none;
color:white;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

textarea{
width:100%;
background:#1a1a1a;
border:none;
color:white;
border-radius:8px;
padding:8px;
margin-top:6px;
}

.prompt{
background:#1e1e1e;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

input,select{
background:#1a1a1a;
border:none;
color:white;
padding:6px;
border-radius:6px;
margin-top:6px;
}

.builder{
background:#1c1c1c;
padding:14px;
border-radius:12px;
margin-top:10px;
}

.result{
background:#1e1e1e;
padding:10px;
border-radius:10px;
margin-top:10px;
}

</style>
</head>

<body>

<header>🎬 AI VIDEO STUDIO</header>


<div class="section">

<h3>AI Tools</h3>

<div class="row">

<div class="card" onclick="openLink('https://grok.com')">Grok A</div>
<div class="card" onclick="openLink('https://grok.com')">Grok B</div>
<div class="card" onclick="openLink('https://app.klingai.com')">Kling AI</div>
<div class="card" onclick="openLink('https://pixverse.ai')">PixVerse</div>
<div class="card" onclick="openLink('https://hailuoai.video')">Hailuo</div>
<div class="card" onclick="openLink('https://capcut.com')">CapCut</div>

</div>

</div>


<div class="section">

<h3>AI Credit Tracker</h3>

<div class="prompt">

Grok credits<br>
<input id="grokCredit" type="number" onchange="saveCredits()">

<br><br>

Kling credits<br>
<input id="klingCredit" type="number" onchange="saveCredits()">

<br><br>

PixVerse credits<br>
<input id="pixCredit" type="number" onchange="saveCredits()">

</div>

</div>


<div class="section">

<h3>Prompt Builder</h3>

<div class="builder">

Character<br>
<select id="char">
<option>couple</option>
<option>beautiful woman</option>
<option>man</option>
<option>child</option>
<option>superhero</option>
</select>

<br><br>

Action<br>
<select id="action">
<option>walking together</option>
<option>talking</option>
<option>hugging</option>
<option>kissing</option>
<option>running</option>
<option>fighting</option>
</select>

<br><br>

Camera
<br>
<select id="camera">
<option>cinematic close up</option>
<option>medium shot</option>
<option>wide cinematic shot</option>
<option>tracking shot</option>
<option>handheld camera</option>
</select>

<br><br>

Lighting
<br>
<select id="light">
<option>soft cinematic lighting</option>
<option>sunset lighting</option>
<option>dramatic lighting</option>
<option>studio lighting</option>
<option>neon lighting</option>
</select>

<br><br>

Style
<br>
<select id="style">
<option>ultra realistic</option>
<option>cinematic film look</option>
<option>8k photorealistic</option>
<option>hyper realistic</option>
<option>movie scene</option>
</select>

<br><br>

<button onclick="generatePrompt()">Generate Prompt</button>

<div class="result">
<textarea id="promptResult" rows="4"></textarea>

<button onclick="copyGenerated()">Copy Prompt</button>
</div>

</div>

</div>


<div class="section">

<h3>Prompt Library</h3>

<select id="category">
<option value="video">Video Prompt</option>
<option value="image">Image Prompt</option>
<option value="camera">Camera Prompt</option>
<option value="character">Character Prompt</option>
</select>

<button onclick="addPrompt()">Add Prompt</button>

<div id="promptList"></div>

</div>


<script>

function openLink(url){
window.open(url,'_blank')
}


function generatePrompt(){

let char=document.getElementById("char").value
let action=document.getElementById("action").value
let camera=document.getElementById("camera").value
let light=document.getElementById("light").value
let style=document.getElementById("style").value

let result=`${style}, ${char} ${action}, ${camera}, ${light}, natural body movement, realistic skin, cinematic motion`

document.getElementById("promptResult").value=result

}


function copyGenerated(){
let text=document.getElementById("promptResult").value
navigator.clipboard.writeText(text)
alert("Prompt copied")
}


function addPrompt(){

let category=document.getElementById("category").value
let text=document.getElementById("promptResult").value || "new prompt"

let prompt={
text:text,
category:category
}

let prompts=getPrompts()
prompts.push(prompt)

localStorage.setItem("prompts",JSON.stringify(prompts))

renderPrompts()

}


function getPrompts(){

let p=localStorage.getItem("prompts")

if(!p) return []

return JSON.parse(p)

}


function renderPrompts(){

let prompts=getPrompts()

let container=document.getElementById("promptList")

container.innerHTML=""

prompts.forEach((p,i)=>{

let div=document.createElement("div")

div.className="prompt"


div.innerHTML=`

<b>${p.category}</b>

<textarea onchange="updatePrompt(${i},this.value)">${p.text}</textarea>

<button onclick="copyPrompt(${i})">Copy</button>

<button onclick="deletePrompt(${i})">Delete</button>

`

container.appendChild(div)

})

}


function updatePrompt(i,text){

let prompts=getPrompts()

prompts[i].text=text

localStorage.setItem("prompts",JSON.stringify(prompts))

}


function deletePrompt(i){

let prompts=getPrompts()

prompts.splice(i,1)

localStorage.setItem("prompts",JSON.stringify(prompts))

renderPrompts()

}


function copyPrompt(i){

let prompts=getPrompts()

navigator.clipboard.writeText(prompts[i].text)

alert("Prompt copied")

}


function saveCredits(){

localStorage.setItem("grokCredit",document.getElementById("grokCredit").value)

localStorage.setItem("klingCredit",document.getElementById("klingCredit").value)

localStorage.setItem("pixCredit",document.getElementById("pixCredit").value)

}


function loadCredits(){


document.getElementById("grokCredit").value=localStorage.getItem("grokCredit")||0

document.getElementById("klingCredit").value=localStorage.getItem("klingCredit")||0

document.getElementById("pixCredit").value=localStorage.getItem("pixCredit")||0

}


renderPrompts()

loadCredits()

</script>

</body>
</html>
