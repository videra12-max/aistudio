<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Video Studio Dashboard</title>
<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#111;
  color:white;
}

header{
  padding:20px;
  font-size:24px;
  font-weight:bold;
}

.section{
  padding:20px;
}

.row{
  display:flex;
  overflow-x:auto;
  gap:12px;
}

.card{
  background:#1e1e1e;
  border-radius:12px;
  padding:16px;
  min-width:160px;
  cursor:pointer;
  transition:0.2s;
}

.card:hover{
  background:#2c2c2c;
}

button{
  background:#e50914;
  border:none;
  color:white;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
}

textarea{
  width:100%;
  border-radius:8px;
  border:none;
  padding:10px;
  margin-top:8px;
  background:#1a1a1a;
  color:white;
}

.prompt-box{
  background:#1e1e1e;
  padding:12px;
  border-radius:10px;
  margin-bottom:12px;
}

.add-btn{
  margin-top:10px;
}

</style>
</head>
<body>

<header>🎬 AI Video Studio</header>

<div class="section">
<h3>AI Tools</h3>
<div class="row">

<div class="card" onclick="openLink('https://grok.com')">
Grok A
</div>

<div class="card" onclick="openLink('https://grok.com')">
Grok B
</div>

<div class="card" onclick="openLink('https://app.klingai.com')">
Kling AI
</div>

<div class="card" onclick="openLink('https://pixverse.ai')">
PixVerse
</div>

<div class="card" onclick="openLink('https://hailuoai.video')">
Hailuo
</div>

<div class="card" onclick="openLink('https://www.capcut.com')">
CapCut
</div>

</div>
</div>

<div class="section">
<h3>Prompt Library</h3>

<div id="promptContainer">

<div class="prompt-box">
<textarea rows="3">ultra realistic cinematic lighting natural body movement 4k film look</textarea>
<button onclick="copyPrompt(this)">Copy</button>
</div>

<div class="prompt-box">
<textarea rows="3">romantic couple cinematic soft lighting natural interaction realistic skin</textarea>
<button onclick="copyPrompt(this)">Copy</button>
</div>

</div>

<button class="add-btn" onclick="addPrompt()">+ Add Prompt</button>
</div>

<script>

function openLink(url){
  window.open(url,'_blank');
}

function copyPrompt(button){
  const textarea = button.parentElement.querySelector('textarea');
  textarea.select();
  document.execCommand('copy');
  alert('Prompt copied');
}

function addPrompt(){
  const container = document.getElementById('promptContainer');

  const box = document.createElement('div');
  box.className = 'prompt-box';

  box.innerHTML = `
<textarea rows="3">new prompt...</textarea>
<button onclick="copyPrompt(this)">Copy</button>
`;

  container.appendChild(box);
}

</script>

</body>
</html>
